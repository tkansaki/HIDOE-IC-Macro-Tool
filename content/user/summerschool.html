<html>
  <head>
    <script src="/scripts/summerschool.js" type="module"></script>
    <link rel="stylesheet" href="/styles/usereditorstyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body style="width: 800px">
    <div class="container-fluid m-2">
      <ul class="nav nav-tabs">
        <li class="nav-item">
          <a class="nav-link" href="/content/user/addcalendar.html">Add</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/content/user/removecalendar.html">Remove</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/content/user/cleanup.html">Cleanup</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="/content/user/summerschool.html">Auto SS</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/content/user/other.html">Other Tools</a>
        </li>
      </ul>
    </div>
    <div id="mainArea" class="m-2 px-2" style="height: 200px; overflow-y: scroll;">
      <textarea class="form-control" id="pastedList"></textarea>
    </div>
    <div class="container-fluid m-1">
      <div class="row">
        <div class="col">
          <div class="input-group mb-3">
            <button type="button" class="btn btn-primary btn-sm" id="parseButton">Parse</button>
            <select class="form-control form-control-sm" id="school"></select>
          </div>
        </div>
        <div class="col">
          <button type="button" class="btn btn-secondary btn-sm" id="showButton" disabled>Show Work Notes</button>
          <button type="button" class="btn btn-warning btn-sm" id="resetButton" disabled>Reset</button>
          <button type="button" class="btn btn-primary btn-sm" id="startButton" disabled>Start</button>
        </div>
      </div>
    </div>
    <div class="container-fluid m-2 p-3" id="notes">
      <div class="row">
        <div class="col">
          <div class="row my-1">
            <div class="col">
              <h6>Additional Comments:</h6>
            </div>
            <div class="col">
              <button type="button" class="btn btn-secondary btn-sm" id="copyAdditionalComments">Copy</button>
            </div>
          </div>
          <textarea class="form-control" type="text" id="additionalComments"></textarea>
        </div>
        <div class="col">
          <div class="row my-1">
            <div class="col">
              <h6>Work Notes:</h6>
            </div>
            <div class="col">
              <button type="button" class="btn btn-secondary btn-sm" id="copyWorkNotes">Copy</button>
            </div>
          </div>
          <textarea class="form-control" type="text" id="workNotes"></textarea>
        </div>
      </div>
    </div>
  </body>
</html>
